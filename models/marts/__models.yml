version: 2
       
models:
  - name: dim_orders
    description: ""
    columns:
      - name: order_id
        data_type: varchar
        description: ""

      - name: shipping_service
        data_type: varchar
        description: ""

      - name: shipping_cost
        data_type: float
        description: ""

      - name: address_id
        data_type: varchar
        description: ""

      - name: created_at
        data_type: timestamp_ntz
        description: ""

      - name: promo_id
        data_type: varchar
        description: ""

      - name: estimated_delivery_at
        data_type: timestamp_ntz
        description: ""

      - name: order_cost
        data_type: float
        description: ""

      - name: user_id
        data_type: varchar
        description: ""

      - name: order_total
        data_type: float
        description: ""

      - name: delivered_at
        data_type: timestamp_ntz
        description: ""

      - name: tracking_id
        data_type: varchar
        description: ""

      - name: status
        data_type: varchar
        description: ""

      - name: _fivetran_deleted
        data_type: timestamp_ntz
        description: ""

      - name: _fivetran_synced
        data_type: timestamp_ntz
        description: ""

  - name: dim_users
    description: ""
    columns:
      - name: user_id
        data_type: varchar
        description: ""

      - name: updated_at
        data_type: timestamp_ntz
        description: ""

      - name: address_id
        data_type: varchar
        description: ""

      - name: last_name
        data_type: varchar
        description: ""

      - name: created_at
        data_type: timestamp_ntz
        description: ""

      - name: phone_number
        data_type: varchar
        description: ""

      - name: total_orders
        data_type: number
        description: ""

      - name: first_name
        data_type: varchar
        description: ""

      - name: email
        data_type: varchar
        description: ""

      - name: _fivetran_deleted
        data_type: timestamp_ntz
        description: ""

      - name: _fivetran_synced
        data_type: timestamp_ntz
        description: ""

  - name: dim_addresses
    description: ""
    columns:
      - name: address_id
        data_type: varchar
        description: ""

      - name: zipcode
        data_type: number
        description: ""

      - name: country
        data_type: varchar
        description: ""

      - name: address
        data_type: varchar
        description: ""

      - name: state
        data_type: varchar
        description: ""

      - name: _fivetran_deleted
        data_type: timestamp_ntz
        description: ""

      - name: _fivetran_synced
        data_type: timestamp_ntz
        description: ""
  - name: dim_time
    description: Spina temporal diaria para MetricFlow.
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        granularity: day

  - name: fct_orders
    description: ""
    columns:
      - name: order_id
        entity: 
          type: primary
          name: orders
        data_type: varchar
        description: ""

      - name: user_id
        entity: 
          type: foreign
          name: user
        data_type: varchar
        description: ""

      - name: address_id
        entity: 
          type: foreign
          name: address
        data_type: varchar
        description: ""

      - name: order_date
        granularity: day # Lo mejor es declarar siempre el grano más fino ya que metricflow puede subir el grano automáticamente
        dimension: 
          type: time
        data_type: timestamp_ntz
        description: ""

      - name: status
        dimension: 
          type: categorical

      - name: address_country
        dimension: 
          type: categorical
          name: pais
        data_type: varchar
        description: ""

      - name: order_total
        data_type: float
        description: ""

      - name: order_cost
        data_type: float
        description: ""

      - name: shippint_cost
        data_type: float
        description: ""

