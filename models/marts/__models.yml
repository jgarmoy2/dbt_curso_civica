version: 2
       
models:
  - name: dim_orders
    description: ""
    columns:
      - name: order_id
        data_type: varchar
        description: ""

      - name: shipping_service
        data_type: varchar
        description: ""

      - name: shipping_cost
        data_type: float
        description: ""

      - name: address_id
        data_type: varchar
        description: ""

      - name: created_at
        data_type: timestamp_ntz
        description: ""

      - name: promo_id
        data_type: varchar
        description: ""

      - name: estimated_delivery_at
        data_type: timestamp_ntz
        description: ""

      - name: order_cost
        data_type: float
        description: ""

      - name: user_id
        data_type: varchar
        description: ""

      - name: order_total
        data_type: float
        description: ""

      - name: delivered_at
        data_type: timestamp_ntz
        description: ""

      - name: tracking_id
        data_type: varchar
        description: ""

      - name: status
        data_type: varchar
        description: ""

      - name: _fivetran_deleted
        data_type: timestamp_ntz
        description: ""

      - name: _fivetran_synced
        data_type: timestamp_ntz
        description: ""

  - name: dim_users
    description: ""
    columns:
      - name: user_id
        data_type: varchar
        description: ""

      - name: updated_at
        data_type: timestamp_ntz
        description: ""

      - name: address_id
        data_type: varchar
        description: ""

      - name: last_name
        data_type: varchar
        description: ""

      - name: created_at
        data_type: timestamp_ntz
        description: ""

      - name: phone_number
        data_type: varchar
        description: ""

      - name: total_orders
        data_type: number
        description: ""

      - name: first_name
        data_type: varchar
        description: ""

      - name: email
        data_type: varchar
        description: ""

      - name: _fivetran_deleted
        data_type: timestamp_ntz
        description: ""

      - name: _fivetran_synced
        data_type: timestamp_ntz
        description: ""

  - name: dim_addresses
    description: ""
    columns:
      - name: address_id
        data_type: varchar
        description: ""

      - name: zipcode
        data_type: number
        description: ""

      - name: country
        data_type: varchar
        description: ""

      - name: address
        data_type: varchar
        description: ""

      - name: state
        data_type: varchar
        description: ""

      - name: _fivetran_deleted
        data_type: timestamp_ntz
        description: ""

      - name: _fivetran_synced
        data_type: timestamp_ntz
        description: ""
  - name: dim_time
    description: Spina temporal diaria para MetricFlow.
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        granularity: day

  - name: fct_orders
    description: ""
    columns:
      - name: order_id
        entity: 
          type: primary
          name: orders
        data_type: varchar
        description: ""

      - name: user_id
        entity: 
          type: foreign
          name: user
        data_type: varchar
        description: ""

      - name: address_id
        entity: 
          type: foreign
          name: address
        data_type: varchar
        description: ""

      - name: order_date
        granularity: day # Lo mejor es declarar siempre el grano más fino ya que metricflow puede subir el grano automáticamente
        dimension: 
          type: time
        data_type: timestamp_ntz
        description: ""

      - name: status
        dimension: 
          type: categorical

      - name: address_country
        dimension: 
          type: categorical
          name: pais
        data_type: varchar
        description: ""

      - name: order_total
        data_type: float
        description: ""

      - name: order_cost
        data_type: float
        description: ""

      - name: shippint_cost
        data_type: float
        description: ""
    metrics:
      - name: total_revenue
        label: Total revenue
        type: simple
        agg: sum
        expr: order_total

      - name: total_orders
        label: Total orders
        type: simple
        agg: count
        expr: order_id

      - name: total_unique_buyers
        label: Total unique buyers
        type: simple
        agg: count_distinct
        expr: user_id

      - name: avg_order_value
        label: Average order value
        type: ratio
        numerator: total_revenue
        denominator: total_orders

      - name: revenue_per_buyer
        label: Revenue per buyer
        type: derived
        expr: revenue / buyers
        input_metrics:
          - name: total_revenue
            alias: revenue
          - name: total_unique_buyers
            alias: buyers

      - name: revenue_l30d
        label: Revenue last 30 days
        type: cumulative

exposures:
  - name: revenue_dashboard
    label: Dashboard semanal de ingresos
    type: dashboard
    maturity: high
    url: https://bi.civica-soft.com/d/revenue
    description: KPI semanal de ingresos para Finanzas.
    depends_on:
      - ref('fct_orders')
      - metric('total_revenue')
      - metric('avg_order_value')
    owner:
      name: Finanzas
      email: finanzas@civica-soft.com