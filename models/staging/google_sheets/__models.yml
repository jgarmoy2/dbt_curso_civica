version: 2

models:
  - name: stg_google_sheets__budget
    config: 
      materialized: view
      contract: 
        enforced: true
    description: "Staggin de google_sheets_budget."
    columns:
      - name: _row
        data_type: integer
        description: "Primary key"
        data_tests:
          - unique
          - not_null 
          
      - name: product_id
        data_type: varchar
        description: "Clave foranea sobre la clave del producto"
        data_tests:
          - unique
          - not_null
          
      - name: quantity
        data_type: integer
        description: "Cantidad de budget"
        data_tests:
          - unique
          - not_null
          
      - name: month
        data_type: date
        description: "Fecha"
        data_tests:
         - not_null
          
      - name: date_load
        data_type: datetime
        description: "Fecha que fivetran sincronizó el dato"
        data_tests:
          - not_null
          
